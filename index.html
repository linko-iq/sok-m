<style>

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}body{font-family:Cairo,sans-serif;background:radial-gradient(circle at 90% 0,rgba(18,185,129,.14),transparent 30%),linear-gradient(180deg,#fbfdff,#eef5f1);color:var(--ink);overflow-x:hidden}button,input,select,textarea{font-family:inherit;font-size:15px}button{border:0;cursor:pointer}.hidden{display:none!important}.muted{color:var(--muted);font-weight:800}.btn{min-height:44px;border-radius:14px;padding:8px 14px;background:linear-gradient(135deg,var(--green),var(--green2));color:#fff;font-weight:900;box-shadow:0 12px 24px rgba(18,185,129,.18);display:inline-flex;align-items:center;justify-content:center;gap:7px}.btn.secondary{background:#fff;color:var(--ink);border:1px solid var(--line);box-shadow:var(--soft)}.btn.danger{background:linear-gradient(135deg,#ef4444,#991b1b)}.btn.warn{background:linear-gradient(135deg,#f59e0b,#b45309)}.btn.dark{background:linear-gradient(135deg,#111827,#344054)}.btn.blue{background:linear-gradient(135deg,#2563eb,#38bdf8)}.btn.mini{min-height:36px;border-radius:12px;font-size:13px;padding:6px 10px}.btn.full{width:100%}.input,select,textarea{width:100%;border:1px solid var(--line);background:#fff;border-radius:15px;min-height:48px;padding:0 13px;outline:0;font-weight:800;color:var(--ink)}textarea{min-height:100px;padding:12px;resize:vertical}.input:focus,select:focus,textarea:focus{border-color:#10b981;box-shadow:0 0 0 4px rgba(16,185,129,.12)}
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:18px}.login-card{width:min(460px,100%);background:rgba(255,255,255,.92);border:1px solid rgba(255,255,255,.9);border-radius:32px;padding:24px;box-shadow:var(--shadow);backdrop-filter:blur(16px)}.brand-logo{width:76px;height:76px;margin:0 auto 12px;border-radius:24px;background:linear-gradient(135deg,#101828,#0f8a55);display:grid;place-items:center;color:white;font-size:30px;box-shadow:0 18px 42px rgba(16,24,40,.18)}.login-card h1{text-align:center;font-size:28px;font-weight:900}.login-card p{text-align:center;color:var(--muted);font-weight:800;line-height:1.8;margin:8px 0 18px}.field{display:grid;gap:7px;margin-bottom:12px}.field label{font-weight:900;color:#344054}.hint{background:#ecfdf3;border:1px solid #bbf7d0;color:#087443;border-radius:18px;padding:10px;font-weight:900;text-align:center;margin-top:10px;line-height:1.7}
.app{display:none;min-height:100vh}.app.show{display:block}.layout{display:grid;grid-template-columns:270px 1fr;min-height:100vh}.sidebar{background:#0b1220;color:#fff;padding:16px;position:sticky;top:0;height:100vh;overflow:auto}.side-head{display:flex;align-items:center;gap:10px;margin-bottom:16px}.side-logo{width:50px;height:50px;border-radius:18px;background:linear-gradient(135deg,var(--green),var(--green2));display:grid;place-items:center;font-weight:900;font-size:22px}.side-head h2{font-size:17px;font-weight:900}.side-head small{color:#a7b0c0;font-weight:800}.nav{display:grid;gap:7px}.nav button{min-height:46px;border-radius:15px;background:transparent;color:#d7dde8;text-align:right;padding:8px 11px;font-weight:900;display:flex;align-items:center;gap:9px}.nav button:hover,.nav button.active{background:rgba(255,255,255,.10);color:#fff}.nav .ico{width:30px;height:30px;border-radius:11px;background:rgba(255,255,255,.08);display:grid;place-items:center}.content{min-width:0}.topbar{position:sticky;top:0;z-index:20;background:rgba(245,247,251,.86);backdrop-filter:blur(15px);border-bottom:1px solid rgba(228,231,236,.75);padding:14px 18px}.top-row{display:flex;align-items:center;justify-content:space-between;gap:12px;max-width:1180px;margin:auto}.page-title h1{font-size:24px;font-weight:900}.page-title p{font-weight:800;color:var(--muted)}.menu-btn{display:none}.main{max-width:1180px;margin:auto;padding:18px}.section{display:none}.section.active{display:block;animation:fade .22s ease}@keyframes fade{from{opacity:.3;transform:translateY(8px)}to{opacity:1;transform:none}}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:14px}.kpi{position:relative;overflow:hidden;background:#fff;border:1px solid var(--line);border-radius:24px;padding:15px;box-shadow:var(--soft)}.kpi:after{content:attr(data-icon);position:absolute;left:12px;bottom:4px;font-size:54px;opacity:.10}.kpi small{color:var(--muted);font-weight:900}.kpi b{display:block;font-size:28px;font-weight:900;margin-top:4px}.panel{background:#fff;border:1px solid var(--line);border-radius:25px;padding:16px;box-shadow:var(--soft);margin-bottom:14px}.panel-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:12px}.panel-head h2{font-size:21px;font-weight:900}.panel-head p{color:var(--muted);font-weight:800;line-height:1.7}.tools{display:grid;grid-template-columns:1.4fr 1fr 1fr auto;gap:8px;margin-bottom:12px}.form-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.wide{grid-column:1/-1}.check-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.check{display:flex;align-items:center;gap:8px;background:#f8fafc;border:1px solid var(--line);border-radius:14px;padding:10px;font-weight:900}.table{width:100%;border-collapse:separate;border-spacing:0 8px}.table th{text-align:right;color:var(--muted);font-size:13px;padding:4px 10px}.table td{background:#f8fafc;border-top:1px solid var(--line);border-bottom:1px solid var(--line);padding:10px;font-weight:800;vertical-align:middle}.table td:first-child{border-right:1px solid var(--line);border-radius:0 15px 15px 0}.table td:last-child{border-left:1px solid var(--line);border-radius:15px 0 0 15px}.status{display:inline-flex;border-radius:999px;padding:5px 9px;font-size:12px;font-weight:900;background:#eef2ff;color:#2563eb}.status.ok{background:#dcfce7;color:#15803d}.status.bad{background:#fee2e2;color:#b91c1c}.status.wait{background:#fff7ed;color:#c2410c}.status.info{background:#dbeafe;color:#1d4ed8}.actions-row{display:flex;gap:6px;flex-wrap:wrap}.cards{display:grid;gap:10px}.product-card,.member-card,.request-card,.branch-card,.log{background:#f8fafc;border:1px solid var(--line);border-radius:20px;padding:12px;display:grid;gap:8px}.product-card{grid-template-columns:62px 1fr auto;align-items:center}.product-img{width:62px;height:62px;border-radius:17px;background:linear-gradient(135deg,#e8fff4,#dbeafe);display:grid;place-items:center;font-size:30px;overflow:hidden}.product-img img{width:100%;height:100%;object-fit:contain;background:#fff;padding:2px}.branch-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.timeline{display:grid;gap:9px}.modal{position:fixed;inset:0;z-index:100;display:none;align-items:center;justify-content:center;background:rgba(15,23,42,.60);backdrop-filter:blur(8px);padding:16px}.modal.show{display:flex}.modal-card{width:min(720px,96vw);max-height:92vh;overflow:auto;background:#fff;border-radius:28px;box-shadow:0 30px 90px rgba(0,0,0,.25);padding:18px}.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}.modal-head h2{font-size:23px;font-weight:900}.x{width:42px;height:42px;border-radius:14px;background:#f2f4f7;font-weight:900}.toast{position:fixed;top:16px;right:16px;left:16px;margin:auto;width:min(520px,calc(100% - 32px));z-index:200;display:none;background:#111827;color:#fff;border-radius:18px;padding:13px;text-align:center;font-weight:900;box-shadow:var(--shadow)}.toast.show{display:block}.empty{text-align:center;color:var(--muted);font-weight:900;padding:24px;background:#f8fafc;border:1px dashed var(--line);border-radius:18px}
.image-picker{grid-column:1/-1;display:grid;grid-template-columns:120px 1fr;gap:12px;align-items:center;background:#f8fafc;border:1px solid var(--line);border-radius:18px;padding:12px}.image-preview{width:120px;height:120px;border-radius:20px;background:#fff;border:1px solid var(--line);display:grid;place-items:center;overflow:hidden;color:#98a2b3;font-weight:900}.image-preview img{width:100%;height:100%;object-fit:contain;padding:4px}.image-picker input[type=file]{padding-top:11px}.image-help{display:block;margin-top:7px;color:var(--muted);font-weight:800;line-height:1.6}
@media(max-width:620px){.image-picker{grid-template-columns:1fr}.image-preview{width:100%;height:170px}}

.member-line{display:grid;grid-template-columns:54px 1fr;gap:10px;align-items:center}.mini-avatar{width:54px;height:54px;border-radius:18px;background:linear-gradient(135deg,#e8fff4,#dbeafe);border:1px solid var(--line);display:grid;place-items:center;overflow:hidden;font-weight:900;color:#0f8a55}.mini-avatar img{width:100%;height:100%;object-fit:contain;background:#fff;padding:2px}.branch-cover{height:96px;border-radius:17px;background:linear-gradient(135deg,#e8fff4,#dbeafe);border:1px solid var(--line);display:grid;place-items:center;overflow:hidden;font-weight:900;color:#0f8a55;margin-bottom:4px}.branch-cover img{width:100%;height:100%;object-fit:contain;background:#fff;padding:3px}.compact-image-picker{grid-column:1/-1;display:grid;grid-template-columns:86px 1fr;gap:10px;align-items:center;background:#f8fafc;border:1px solid var(--line);border-radius:17px;padding:10px}.compact-image-picker .image-preview{width:86px;height:86px;border-radius:18px}.upload-label{display:inline-flex;min-height:40px;border-radius:13px;padding:7px 12px;background:#fff;border:1px solid var(--line);font-weight:900;align-items:center;justify-content:center;gap:6px;box-shadow:var(--soft);cursor:pointer}.image-hidden-input{position:absolute!important;opacity:0!important;pointer-events:none!important;width:1px!important;height:1px!important}
@media(max-width:620px){.compact-image-picker{grid-template-columns:72px 1fr}.compact-image-picker .image-preview{width:72px;height:72px}.member-line{grid-template-columns:48px 1fr}.mini-avatar{width:48px;height:48px}.branch-cover{height:86px}}

.danger-zone{border-color:#fecaca;background:#fff7f7}
@media(max-width:980px){.layout{grid-template-columns:1fr}.sidebar{position:fixed;right:0;top:0;bottom:0;width:285px;z-index:50;transform:translateX(105%);transition:.25s}.sidebar.open{transform:translateX(0)}.menu-btn{display:inline-flex}.kpis{grid-template-columns:repeat(2,1fr)}.tools{grid-template-columns:1fr 1fr}.form-grid{grid-template-columns:1fr 1fr}.branch-grid{grid-template-columns:1fr 1fr}.main{padding:14px}.topbar{padding:12px}}
@media(max-width:620px){.kpis,.tools,.form-grid,.branch-grid{grid-template-columns:1fr}.check-grid{grid-template-columns:1fr 1fr}.product-card{grid-template-columns:54px 1fr}.product-card .actions-row{grid-column:1/-1}.panel-head{align-items:flex-start;flex-direction:column}.table thead{display:none}.table,.table tbody,.table tr,.table td{display:block;width:100%}.table tr{background:#f8fafc;border:1px solid var(--line);border-radius:18px;margin-bottom:10px;padding:8px}.table td{border:0!important;border-radius:0!important;background:transparent;padding:6px 4px;display:flex;justify-content:space-between;gap:12px}.table td:before{content:attr(data-label);color:var(--muted);font-weight:900}.top-row{align-items:flex-start}.page-title h1{font-size:20px}.btn{min-height:42px}.login-card{padding:18px;border-radius:26px}}

<body>
<section class="login-page" id="loginPage">
  <div class="login-card">
    <div class="brand-logo">LM</div>
    <h1>لوحة إدارة سوق المدينة الكبير</h1>
    <p>دخول الإدارة للتحكم بالطلبات، الأعضاء، المنتجات، الفروع، الرصيد، والتقارير.</p>
    <div class="field"><label>اسم المستخدم أو اللقب</label><input class="input" id="loginUser" value="admin" autocomplete="username"></div>
    <div class="field"><label>كلمة المرور</label><input class="input" id="loginPass" value="123456" type="password" autocomplete="current-password"></div>
    <button class="btn full" onclick="loginAdmin()">دخول لوحة الإدارة</button>
    <div class="hint">للتجربة: admin / 123456</div>
  </div>
</section>
<div class="app" id="app">
  <div class="layout">
    <aside class="sidebar" id="sidebar"><div class="side-head"><div class="side-logo">LM</div><div><h2>LINKO Market</h2><small>Admin Control Center</small></div></div><nav class="nav" id="nav"></nav></aside>
    <main class="content">
      <header class="topbar"><div class="top-row"><button class="btn secondary menu-btn" onclick="toggleMenu()">☰</button><div class="page-title"><h1 id="pageTitle">الرئيسية Dashboard</h1><p id="pageDesc">نظرة سريعة على حالة النظام اليوم.</p></div><button class="btn dark" onclick="logoutAdmin()">خروج</button></div></header>
      <div class="main" id="main"></div>
    </main>
  </div>
</div>
<div class="modal" id="modal"><div class="modal-card"><div class="modal-head"><h2 id="modalTitle"></h2><button class="x" onclick="closeModal()">✕</button></div><div id="modalBody"></div></div></div>
<div class="toast" id="toast"></div>
<script>
const $=id=>document.getElementById(id);
const LS='linko_market_admin_v2_state';
const sections=[['dashboard','🏠','الرئيسية Dashboard','نظرة سريعة على حالة النظام اليوم.'],['subscriptions','📝','طلبات الاشتراك','مراجعة طلبات الاشتراك الجديدة والموافقة أو الرفض.'],['members','👥','إدارة الأعضاء','بحث وتعديل بيانات الأعضاء والرصيد والحالة.'],['products','🛒','إدارة المنتجات','إضافة وتعديل وحذف المنتجات والتحكم بالحالة والبيع.'],['branches','🏬','إدارة الفروع','إدارة فروع السوق والأقسام المرتبطة بها.'],['reports','📊','التقارير','إحصائيات الطلبات والأعضاء والمنتجات والفروع.'],['notifications','🔔','الإشعارات','إرسال إشعارات عامة أو مخصصة وسجل الإرسال.'],['logs','📜','سجل العمليات','تتبع كل عملية مهمة داخل النظام.'],['settings','⚙️','إعدادات النظام','إعدادات عامة للهوية والعملة والواتساب.']];
let active='dashboard', state=loadState();
function seed(){return{settings:{market:'سوق المدينة الكبير',whatsapp:'9647887624967',currency:'د.ع'},requests:[{id:1,name:'حسين علي',phone:'07700000000',area:'المنصور',code:'1122',status:'pending',date:'اليوم'},{id:2,name:'علي جبار',phone:'07800000000',area:'الكرادة',code:'3344',status:'pending',date:'اليوم'}],members:[{id:101,name:'محمد كريم',phone:'07711111111',area:'زيونة',code:'4455',balance:25000,status:'active',img:''},{id:102,name:'زينب أحمد',phone:'07822222222',area:'الأعظمية',code:'7788',balance:0,status:'stopped',img:''}],products:[{id:201,name:'رز عنبر',price:2500,cat:'المواد الغذائية',branch:'كل الفروع',status:'available',sell:'بالوزن',qty:'1 كغم',badge:'جديد',img:''},{id:202,name:'زيت طبخ',price:18000,cat:'المواد الغذائية',branch:'كل الفروع',status:'available',sell:'بالكرتون',qty:'12 قطعة',badge:'عرض',img:''},{id:203,name:'عصير برتقال',price:1500,cat:'المشروبات',branch:'فرع الكرادة',status:'unavailable',sell:'بالحجم',qty:'1 لتر',badge:'',img:''}],branches:[{id:301,name:'فرع المنصور',area:'المنصور',status:'active',img:''},{id:302,name:'فرع الكرادة',area:'الكرادة',status:'active',img:''},{id:303,name:'فرع زيونة',area:'زيونة',status:'active',img:''}],notifications:[],logs:[{id:1,type:'تهيئة النظام',by:'admin',time:new Date().toLocaleString('ar-IQ'),details:'تم تشغيل نسخة لوحة الإدارة الوظيفية.'}],orders:[{id:1,branch:'فرع المنصور',total:0,status:'new'},{id:2,branch:'فرع الكرادة',total:0,status:'new'}]}}
function loadState(){try{return JSON.parse(localStorage.getItem(LS))||seed()}catch(e){return seed()}}
function save(){localStorage.setItem(LS,JSON.stringify(state))}
function log(type,details){state.logs.unshift({id:Date.now(),type,by:'admin',time:new Date().toLocaleString('ar-IQ'),details});save()}
function toast(t){const x=$('toast');x.textContent=t;x.classList.add('show');setTimeout(()=>x.classList.remove('show'),1800)}
function loginAdmin(){if($('loginUser').value.trim()==='admin' && $('loginPass').value.trim()==='123456'){$('loginPage').classList.add('hidden');$('app').classList.add('show');toast('تم دخول لوحة الإدارة');render()}else toast('بيانات الدخول غير صحيحة')}
function logoutAdmin(){$('app').classList.remove('show');$('loginPage').classList.remove('hidden')}
function toggleMenu(){$('sidebar').classList.toggle('open')}
function buildNav(){ $('nav').innerHTML=sections.map(s=>`<button class="${s[0]===active?'active':''}" onclick="openSec('${s[0]}')"><span class="ico">${s[1]}</span>${s[2]} ${s[0]==='subscriptions'&&pendingReq()?`<span class="status bad">${pendingReq()}</span>`:''}</button>`).join('')}
function openSec(id){active=id;const s=sections.find(x=>x[0]===id);$('pageTitle').textContent=s[2];$('pageDesc').textContent=s[3];$('sidebar').classList.remove('open');render()}
function pendingReq(){return state.requests.filter(x=>x.status==='pending').length}
function statusText(s){return s==='pending'?'بانتظار':s==='approved'?'مقبول':s==='rejected'?'مرفوض':s==='active'?'مفعل':s==='stopped'?'موقوف':s==='available'?'متوفر':'غير متوفر'}
function cls(v){return ['approved','active','available','مفعل','مقبول','متوفر'].includes(v)?'ok':['pending','بانتظار'].includes(v)?'wait':'bad'}
function money(n){return Number(n||0).toLocaleString('ar-IQ')+' '+state.settings.currency}
function render(){buildNav();let html=''; if(active==='dashboard')html=dashboard(); if(active==='subscriptions')html=subscriptions(); if(active==='members')html=members(); if(active==='products')html=products(); if(active==='branches')html=branches(); if(active==='reports')html=reports(); if(active==='notifications')html=notifications(); if(active==='logs')html=logs(); if(active==='settings')html=settings(); $('main').innerHTML=html}
function dashboard(){const added=state.logs.filter(l=>l.type==='إضافة رصيد' && l.time.includes(new Date().toLocaleDateString('ar-IQ'))).length;return `<div class="kpis"><div class="kpi" data-icon="📝"><small>طلبات اشتراك جديدة</small><b>${pendingReq()}</b></div><div class="kpi" data-icon="👥"><small>عدد الأعضاء</small><b>${state.members.length}</b></div><div class="kpi" data-icon="🛒"><small>عدد المنتجات</small><b>${state.products.length}</b></div><div class="kpi" data-icon="🏬"><small>عدد الفروع</small><b>${state.branches.length}</b></div><div class="kpi" data-icon="📦"><small>الطلبات الجديدة</small><b>${state.orders.filter(o=>o.status==='new').length}</b></div><div class="kpi" data-icon="💳"><small>عمليات رصيد اليوم</small><b>${added}</b></div><div class="kpi" data-icon="⚠️"><small>منتجات غير متوفرة</small><b>${state.products.filter(p=>p.status==='unavailable').length}</b></div><div class="kpi" data-icon="🔔"><small>الإشعارات</small><b>${state.notifications.length}</b></div></div><div class="panel"><div class="panel-head"><div><h2>تنبيهات مهمة</h2><p>ملخص سريع لما يحتاج متابعة.</p></div></div><div class="timeline"><div class="log"><h3>طلبات اشتراك بانتظار الموافقة</h3><p>${pendingReq()} طلب يحتاج مراجعة.</p></div><div class="log"><h3>منتجات غير متوفرة</h3><p>${state.products.filter(p=>p.status==='unavailable').length} منتج ظاهر للزبائن بعلامة غير متوفر.</p></div></div></div>`}
function subscriptions(){let q=($('reqSearch')?.value||'');let list=state.requests.filter(r=>!q||[r.name,r.phone,r.area,r.code].join(' ').includes(q));return `<div class="panel"><div class="panel-head"><div><h2>طلبات الاشتراك</h2><p>قبول الطلب ينقله مباشرة إلى إدارة الأعضاء.</p></div></div><div class="tools"><input class="input" id="reqSearch" oninput="render()" value="${q}" placeholder="بحث بالاسم أو الهاتف أو الرمز"><select id="reqStatus" onchange="render()"><option>كل الحالات</option></select><button class="btn secondary" onclick="render()">تحديث</button><button class="btn danger" onclick="clearRejected()">حذف المرفوض</button></div><div class="cards">${list.length?list.map(r=>`<div class="request-card"><h3>${r.name} <span class="status ${cls(r.status)}">${statusText(r.status)}</span></h3><p class="muted">الهاتف: ${r.phone} • المنطقة: ${r.area} • الرمز: ${r.code} • ${r.date}</p><div class="actions-row"><button class="btn mini" onclick="approveReq(${r.id})">موافقة</button><button class="btn warn mini" onclick="rejectReq(${r.id})">رفض</button><button class="btn danger mini" onclick="deleteReq(${r.id})">حذف</button></div></div>`).join(''):'<div class="empty">لا توجد طلبات اشتراك</div>'}</div></div>`}
function approveReq(id){let r=state.requests.find(x=>x.id===id);if(!r)return; state.members.unshift({id:Date.now(),name:r.name,phone:r.phone,area:r.area,code:r.code,balance:0,status:'active',img:''}); state.requests=state.requests.filter(x=>x.id!==id); log('موافقة على عضو','تم قبول طلب '+r.name); save(); toast('تمت الموافقة ونقل العضو'); render()}
function rejectReq(id){let r=state.requests.find(x=>x.id===id);if(r){r.status='rejected';log('رفض طلب اشتراك','تم رفض طلب '+r.name);save();toast('تم رفض الطلب');render()}}
function deleteReq(id){if(confirm('تأكيد حذف الطلب؟')){state.requests=state.requests.filter(x=>x.id!==id);log('حذف طلب اشتراك','تم حذف طلب اشتراك');save();toast('تم الحذف');render()}}

function openMember(id){const m=id?state.members.find(x=>x.id===id):{name:'',phone:'',area:'',code:'',balance:0,status:'active',img:''};const imgSrc=m.img||'';openModal(id?'تعديل عضو':'إضافة عضو',`<div class="form-grid"><div class="compact-image-picker"><div class="image-preview" id="mImgPreviewBox">${imgSrc?`<img src="${imgSrc}" alt="صورة العضو">`:`<span>${initials(m.name)}</span>`}</div><div><label style="display:block;margin-bottom:7px;font-weight:900;color:#344054">صورة العضو</label><input id="mImg" type="hidden" value="${imgSrc}"><input class="image-hidden-input" id="mFile" type="file" accept="image/*" onchange="handleAdminImageUpload(event,'mImg','mImgPreviewBox','صورة العضو')"><label class="upload-label" for="mFile">📷 اختيار صورة</label><button type="button" class="btn danger mini" style="margin-right:6px" onclick="clearAdminImage('mImg','mImgPreviewBox','${initials(m.name)}')">حذف</button><small class="image-help">اختيارية وتظهر صغيرة داخل بطاقة العضو بدون أخذ مساحة.</small></div></div><div class="field"><label>الاسم</label><input class="input" id="mName" value="${m.name}"></div><div class="field"><label>الهاتف</label><input class="input" id="mPhone" value="${m.phone}"></div><div class="field"><label>المنطقة</label><input class="input" id="mArea" value="${m.area}"></div><div class="field"><label>الرمز</label><input class="input" id="mCode" value="${m.code}"></div><div class="field"><label>الرصيد</label><input class="input" id="mBalance" type="number" value="${m.balance}"></div><div class="field"><label>الحالة</label><select id="mStatus"><option value="active" ${m.status==='active'?'selected':''}>مفعل</option><option value="stopped" ${m.status==='stopped'?'selected':''}>موقوف</option></select></div><button class="btn wide" onclick="saveMember(${id||0})">حفظ العضو</button></div>`) }
function saveMember(id){let data={name:mName.value,phone:mPhone.value,area:mArea.value,code:mCode.value,balance:+mBalance.value||0,status:mStatus.value,img:document.getElementById('mImg')?.value||''};if(!data.name||!data.phone){toast('أكمل الاسم والهاتف');return}if(id){Object.assign(state.members.find(x=>x.id===id),data);log('تعديل عضو','تم تعديل '+data.name)}else{state.members.unshift({id:Date.now(),...data});log('إضافة عضو','تم إضافة '+data.name)}save();closeModal();toast('تم حفظ العضو');render()}
function toggleMember(id){let m=state.members.find(x=>x.id===id);m.status=m.status==='active'?'stopped':'active';log('تغيير حالة عضو','تم تغيير حالة '+m.name);save();render()}
function deleteMember(id){if(confirm('تأكيد حذف العضو؟')){let m=state.members.find(x=>x.id===id);state.members=state.members.filter(x=>x.id!==id);log('حذف عضو','تم حذف '+(m?.name||''));save();render()}}
function products(){let q=($('prodSearch')?.value||'');let list=state.products.filter(p=>!q||[p.name,p.cat,p.branch,p.status].join(' ').includes(q));return `<div class="panel"><div class="panel-head"><div><h2>إدارة المنتجات</h2><p>إضافة وتعديل وحذف وتغيير حالة المنتج.</p></div><button class="btn mini" onclick="openProduct()">+ إضافة منتج</button></div><div class="tools"><input class="input" id="prodSearch" oninput="render()" value="${q}" placeholder="بحث عن منتج"><select><option>كل الأقسام</option><option>المواد الغذائية</option><option>المشروبات</option></select><select><option>متوفر وغير متوفر</option></select><button class="btn secondary" onclick="render()">فلترة</button></div><div class="cards">${list.map(productCard).join('')}</div></div>`}
function productCard(p){return `<div class="product-card"><div class="product-img">${p.img?`<img src="${p.img}">`:'🛒'}</div><div><h3>${p.name} ${p.badge?`<span class="status info">${p.badge}</span>`:''}</h3><p class="muted">${p.cat} • ${p.branch} • ${p.sell} • ${p.qty}</p><b>${money(p.price)}</b> <span class="status ${cls(p.status)}">${statusText(p.status)}</span></div><div class="actions-row"><button class="btn secondary mini" onclick="openProduct(${p.id})">تعديل</button><button class="btn warn mini" onclick="toggleProduct(${p.id})">الحالة</button><button class="btn danger mini" onclick="deleteProduct(${p.id})">حذف</button></div></div>`}

 id="pFile" type="file" accept="image/*" onchange="handleProductImageUpload(event)"><label class="upload-label" for="pFile">📷 اختيار صورة من الجهاز</label><div class="image-actions"><button type="button" class="btn secondary mini" onclick="previewProductImageFull()">معاينة كاملة</button><button type="button" class="btn danger mini" onclick="clearProductImage()">حذف الصورة</button></div><small class="image-help">النظام يرتّب الصورة تلقائياً داخل إطار موحّد بدون قص أو تشويه، ويضيف فراغاً نظيفاً عند الحاجة حتى تظهر كاملة.</small></div></div><button class="btn wide" onclick="saveProduct(${id||0})">حفظ المنتج</button></div>`)
}
function makeContainedProductImage(src,done){
 const img=new Image();
 img.onload=()=>{
  const outW=1200,outH=900;
  const canvas=document.createElement('canvas');canvas.width=outW;canvas.height=outH;
  const ctx=canvas.getContext('2d');
  ctx.fillStyle='#ffffff';ctx.fillRect(0,0,outW,outH);
  // خلفية خفيفة احترافية حتى الصور الشفافة أو الشعارات تبقى واضحة
  const grd=ctx.createLinearGradient(0,0,outW,outH);grd.addColorStop(0,'#ffffff');grd.addColorStop(1,'#f8fafc');ctx.fillStyle=grd;ctx.fillRect(0,0,outW,outH);
  const pad=70;
  const scale=Math.min((outW-pad*2)/img.width,(outH-pad*2)/img.height);
  const w=Math.round(img.width*scale), h=Math.round(img.height*scale);
  const x=Math.round((outW-w)/2), y=Math.round((outH-h)/2);
  ctx.drawImage(img,x,y,w,h);
  done(canvas.toDataURL('image/jpeg',0.88));
 };
 img.onerror=()=>toast('تعذر قراءة الصورة');
 img.src=src;
}
function handleProductImageUpload(ev){
 const file=ev.target.files&&ev.target.files[0]; if(!file)return;
 if(!file.type.startsWith('image/')){toast('اختر ملف صورة فقط');return;}
 if(file.size>8*1024*1024){toast('الصورة كبيرة جداً، اختر صورة أقل من 8MB');return;}
 const reader=new FileReader();
 reader.onload=e=>{
  makeContainedProductImage(e.target.result,(data)=>{
   const input=document.getElementById('pImg'); if(input)input.value=data;
   const box=document.getElementById('pImgPreviewBox'); if(box)box.innerHTML=`<img id="pImgPreview" src="${data}" alt="معاينة صورة المنتج">`;
   toast('تم ترتيب الصورة بدون قص');
  });
 };
 reader.readAsDataURL(file);
}
function clearProductImage(){
 const input=document.getElementById('pImg'); if(input)input.value='';
 const file=document.getElementById('pFile'); if(file)file.value='';
 const box=document.getElementById('pImgPreviewBox'); if(box)box.innerHTML='<span id="pImgPlaceholder">صورة المنتج</span>';
 toast('تم حذف الصورة من المنتج');
}
function previewProductImageFull(){
 const src=document.getElementById('pImg')?.value;
 if(!src){toast('لا توجد صورة للمعاينة');return;}
 const w=window.open('','_blank');
 if(w){w.document.write(`<html dir="rtl"><head><title>معاينة الصورة</title><style>body{margin:0;background:#0b1220;display:grid;place-items:center;min-height:100vh}img{max-width:96vw;max-height:96vh;object-fit:contain;background:#fff;border-radius:18px;padding:12px}</style></head><body><img src="${src}"></body></html>`);w.document.close();}
}

function handleAdminImageUpload(ev,inputId,boxId,label){
 const file=ev.target.files&&ev.target.files[0]; if(!file)return;
 if(!file.type.startsWith('image/')){toast('اختر ملف صورة فقط');return;}
 if(file.size>8*1024*1024){toast('الصورة كبيرة جداً، اختر صورة أقل من 8MB');return;}
 const reader=new FileReader();
 reader.onload=e=>{makeContainedProductImage(e.target.result,(data)=>{const input=document.getElementById(inputId); if(input)input.value=data; const box=document.getElementById(boxId); if(box)box.innerHTML=`<img src="${data}" alt="${label}">`; toast('تم ترتيب الصورة بدون قص');});};
 reader.readAsDataURL(file);
}
function clearAdminImage(inputId,boxId,placeholder){const input=document.getElementById(inputId); if(input)input.value=''; const box=document.getElementById(boxId); if(box)box.innerHTML=`<span>${placeholder||'صورة'}</span>`; toast('تم حذف الصورة');}

function toggleProduct(id){let p=state.products.find(x=>x.id===id);p.status=p.status==='available'?'unavailable':'available';log('تغيير حالة منتج','تم تغيير حالة '+p.name);save();render()}
function deleteProduct(id){if(confirm('تأكيد حذف المنتج؟')){let p=state.products.find(x=>x.id===id);state.products=state.products.filter(x=>x.id!==id);log('حذف منتج','تم حذف '+(p?.name||''));save();render()}}

function toggleBranch(id){let b=state.branches.find(x=>x.id===id);b.status=b.status==='active'?'stopped':'active';log('تغيير حالة فرع','تم تغيير حالة '+b.name);save();render()}

 setTimeout(()=>document.getElementById('qwAmount')?.focus(),80);
}
function addWallet(id){let m=state.members.find(x=>x.id==id), amount=+document.getElementById('qwAmount')?.value||0, note=document.getElementById('qwNote')?.value||'';if(!m||amount<=0){toast('اكتب مبلغ صحيح');return}m.balance+=amount;log('إضافة رصيد',`تم إضافة ${money(amount)} للعضو ${m.name}. ${note}`);save();closeModal();toast('تمت إضافة الرصيد');render()}
function reports(){let most=state.products[0]?.name||'لا يوجد';return `<div class="kpis"><div class="kpi" data-icon="📦"><small>الطلبات اليومية</small><b>${state.orders.length}</b></div><div class="kpi" data-icon="📅"><small>الطلبات الأسبوعية</small><b>${state.orders.length*7}</b></div><div class="kpi" data-icon="⭐"><small>أكثر المنتجات طلباً</small><b>${most}</b></div><div class="kpi" data-icon="🏬"><small>أكثر الفروع نشاطاً</small><b>${state.branches[0]?.name||'-'}</b></div><div class="kpi" data-icon="👥"><small>عدد الأعضاء</small><b>${state.members.length}</b></div><div class="kpi" data-icon="💳"><small>إجمالي الأرصدة</small><b>${money(state.members.reduce((a,b)=>a+b.balance,0))}</b></div><div class="kpi" data-icon="⏳"><small>الطلبات المعلقة</small><b>${state.orders.filter(o=>o.status==='new').length}</b></div></div>`}
function notifications(){return `<div class="panel"><div class="panel-head"><div><h2>الإشعارات</h2><p>إرسال إشعار عام أو مخصص.</p></div></div><div class="form-grid"><div class="field"><label>نوع الإرسال</label><select id="nType"><option>عام</option><option>فرع معين</option><option>عضو معين</option></select></div><div class="field"><label>العنوان</label><input class="input" id="nTitle"></div><div class="field wide"><label>نص الإشعار</label><textarea id="nText"></textarea></div><button class="btn wide" onclick="sendNotification()">إرسال الإشعار</button></div></div><div class="panel"><h2>سجل الإشعارات</h2><div class="timeline">${state.notifications.length?state.notifications.map(n=>`<div class="log"><h3>${n.title}</h3><p>${n.text}<br><span class="muted">${n.type} • ${n.time}</span></p></div>`).join(''):'<div class="empty">لا توجد إشعارات مرسلة</div>'}</div></div>`}
function sendNotification(){if(!nTitle.value||!nText.value){toast('أكمل العنوان والنص');return}state.notifications.unshift({id:Date.now(),type:nType.value,title:nTitle.value,text:nText.value,time:new Date().toLocaleString('ar-IQ')});log('إرسال إشعار','تم إرسال إشعار: '+nTitle.value);save();toast('تم إرسال الإشعار');render()}
function logs(){return `<div class="panel"><div class="panel-head"><div><h2>سجل العمليات</h2><p>كل عملية مهمة داخل النظام.</p></div><button class="btn danger mini" onclick="clearLogs()">مسح السجل</button></div><div class="timeline">${state.logs.map(l=>`<div class="log"><h3>${l.type}</h3><p>${l.details}<br><span class="muted">بواسطة ${l.by} • ${l.time}</span></p></div>`).join('')}</div></div>`}
function clearLogs(){if(confirm('تأكيد مسح سجل العمليات؟')){state.logs=[];save();render()}}
function settings(){return `<div class="panel"><div class="panel-head"><div><h2>إعدادات النظام</h2><p>هوية النظام والواتساب والعملة.</p></div></div><div class="form-grid"><div class="field"><label>اسم السوق</label><input class="input" id="sMarket" value="${state.settings.market}"></div><div class="field"><label>رقم واتساب الإدارة</label><input class="input" id="sWhats" value="${state.settings.whatsapp}"></div><div class="field"><label>العملة</label><input class="input" id="sCurrency" value="${state.settings.currency}"></div><button class="btn wide" onclick="saveSettings()">حفظ الإعدادات</button></div></div><div class="panel danger-zone"><h2>منطقة خطرة</h2><p class="muted">إعادة تعيين بيانات التجربة فقط.</p><button class="btn danger" onclick="resetData()">إعادة تعيين البيانات</button></div>`}
function saveSettings(){state.settings={market:sMarket.value,whatsapp:sWhats.value,currency:sCurrency.value};log('تعديل إعدادات','تم حفظ إعدادات النظام');save();toast('تم حفظ الإعدادات');render()}
function resetData(){if(confirm('تأكيد إعادة تعيين كل بيانات لوحة الإدارة؟')){state=seed();save();toast('تمت إعادة التعيين');render()}}
function openModal(t,b){$('modalTitle').textContent=t;$('modalBody').innerHTML=b;$('modal').classList.add('show')}
function closeModal(){$('modal').classList.remove('show')}
buildNav();render();
</script>
</body>
</html>
